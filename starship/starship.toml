# Starship configuration
format = """
$directory$git_branch$git_status$time
$character"""

right_format = """$custom"""

[time]
disabled = false
format = "[at ](dimmed)[$time]()"
time_format = "%H:%M:%S"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "~/"
format = "[$path]($style) "

[git_branch]
symbol = ""
format = "[on](dimmed) [$branch]($style)"

[git_status]
format = "[ with](dimmed)[$staged$modified]($style) "
staged = "[ S$count](green)"
modified = "[ C$count](yellow)"
deleted = ""
renamed = ""
untracked = ""
conflicted = ""
ahead = ""
behind = ""
diverged = ""
stashed = ""
up_to_date = ""

[custom.prev_branch]
command = "git rev-parse --abbrev-ref @{-1} 2>/dev/null"
when = "git rev-parse --is-inside-work-tree 2>/dev/null && git rev-parse @{-1} >/dev/null 2>&1"
format = "[prev: $output]($style)"
style = "dimmed"

[docker_context]
symbol = "🐳 "
format = "[$symbol$context]($style) "

[aws]
disabled = true
